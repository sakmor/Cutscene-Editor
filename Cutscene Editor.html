<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Animator Pro - 旗艦完整版 (Bug Fixes)</title>
        <link rel="stylesheet" href="assets/css/cutscene-editor.css?v=20260320-1815">
</head>
<body>

    <div id="workspace">
        <div id="canvas-container">
            <div class="axis-h"></div>
            <div class="axis-v"></div>
            <div id="canvas-mask-frame">
                <div id="canvas-mask-label"></div>
                <div id="canvas-viewport"></div>
            </div>
            <div id="zoom-controls">
                <button class="zoom-btn" onclick="zoomOut()" title="縮小 (滾輪↓)">−</button>
                <span id="zoom-display">100%</span>
                <button class="zoom-btn" onclick="zoomIn()" title="放大 (滾輪↑)">+</button>
                <button class="zoom-btn" onclick="resetZoom()" title="重設縮放 (100%)">↺</button>
            </div>
        </div>

        <div id="sidebar">
            <div class="panel-section" data-section-id="layers">
                <h2>PIXEL ANIMATOR Pro</h2>
                <div class="section-header">
                    <h3>1. 圖層面板 (Layers)</h3>
                    <button class="section-toggle" type="button" onclick="toggleSidebarSection('layers')" aria-expanded="true" aria-controls="sidebar-section-layers">收合</button>
                </div>
                <div class="section-body" id="sidebar-section-layers">
                    <div class="btn-add-obj-wrapper">
                        <span class="btn-add-obj">+ 新增圖片物件...</span>
                        <input type="file" id="file-input" accept="image/*">
                    </div>
                    <div class="btn-add-obj-wrapper">
                        <button class="btn-add-obj" type="button" onclick="importSpineBundle()">+ 匯入 Spine 資料夾...</button>
                        <input type="file" id="spine-input" accept=".json,.atlas,.png,.jpg,.jpeg,.webp" webkitdirectory directory multiple>
                    </div>
                    <div id="object-list-container" class="list-container">
                        <ul id="object-list"></ul>
                    </div>
                    <div class="control-group">
                        <label for="layer-note-input">圖層註解：</label>
                        <textarea id="layer-note-input" rows="3" placeholder="例如：主角立繪、夜景背景、翻頁時使用" disabled></textarea>
                    </div>
                    <div id="spine-panel" style="display:none;">
                        <div class="control-group">
                            <label>Spine Animation:</label>
                            <select id="spine-animation-select"></select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section" data-section-id="properties">
                <div class="section-header">
                    <h3>2. 調整當前姿勢 (屬性編輯)</h3>
                    <button class="section-toggle" type="button" onclick="toggleSidebarSection('properties')" aria-expanded="true" aria-controls="sidebar-section-properties">收合</button>
                </div>
                <div class="section-body" id="sidebar-section-properties">
                    <div class="control-group">
                        <label>輸出遮罩：</label>
                        <div class="inline-action-row">
                            <input type="number" id="output-mask-width" min="1" placeholder="Width">
                            <input type="number" id="output-mask-height" min="1" placeholder="Height">
                            <button type="button" onclick="applyOutputMask()">套用</button>
                            <button type="button" onclick="clearOutputMask()">清除</button>
                        </div>
                        <div id="output-mask-status"></div>
                    </div>
                    <div id="props-panel" style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 3px; opacity: 0.5; pointer-events: none;">
                        <div class="control-group"><label>X座標:</label><input type="number" id="prop-x" value="0"></div>
                        <div class="control-group"><label>Y座標:</label><input type="number" id="prop-y" value="0"></div>
                        <div class="control-group"><label>旋轉 (deg):</label><input type="number" id="prop-rot" value="0"></div>
                        <div class="control-group"><label>縮放 (Scale):</label><input type="number" id="prop-scale" value="1" step="0.1"></div>
                        <div class="control-group" style="grid-column: 1 / span 2;"><label>透明度 (Opacity):</label><input type="number" id="prop-opacity" value="1" step="0.1" max="1"></div>
                    </div>
                    <div id="tint-panel" style="margin-top: 6px; opacity: 0.5; pointer-events: none; display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                        <div class="control-group" style="grid-column: 1 / span 2;">
                            <label>Tint:</label>
                            <input type="color" id="prop-tint" value="#ffffff">
                        </div>
                        <div class="control-group">
                            <label>Tint Strength:</label>
                            <input type="number" id="prop-tint-strength" value="100" min="0" max="100" step="1">
                        </div>
                        <div class="control-group">
                            <label>Hue:</label>
                            <input type="number" id="prop-hue" value="0" min="-180" max="180" step="1">
                        </div>
                        <div class="control-group">
                            <label>Brightness:</label>
                            <input type="number" id="prop-brightness" value="100" min="0" max="300" step="1">
                        </div>
                        <div class="control-group">
                            <label>Contrast:</label>
                            <input type="number" id="prop-contrast" value="100" min="0" max="300" step="1">
                        </div>
                        <div class="control-group" style="grid-column: 1 / span 2;">
                            <label>Blend Mode:</label>
                            <select id="prop-blend-mode">
                                <option value="normal">Normal</option>
                                <option value="multiply">Multiply</option>
                                <option value="screen">Screen</option>
                                <option value="overlay">Overlay</option>
                                <option value="darken">Darken</option>
                                <option value="lighten">Lighten</option>
                                <option value="color-dodge">Color Dodge</option>
                                <option value="color-burn">Color Burn</option>
                                <option value="hard-light">Hard Light</option>
                                <option value="soft-light">Soft Light</option>
                                <option value="difference">Difference</option>
                                <option value="exclusion">Exclusion</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section snapshot-section" data-section-id="snapshot">
                <div class="section-header">
                    <h3>3. 影格快門 (Snapshot)</h3>
                    <button class="section-toggle" type="button" onclick="toggleSidebarSection('snapshot')" aria-expanded="true" aria-controls="sidebar-section-snapshot">收合</button>
                </div>
                <div class="section-body" id="sidebar-section-snapshot">
                    <div class="control-group">
                        <label>與上一個影格的間隔 (秒):</label>
                        <input type="number" id="prop-interval" value="0.5" step="0.1" min="0">
                    </div>
                    <button class="btn-snapshot" id="btn-snapshot" onclick="handleSnapshotAction()" disabled>📸 記錄為新影格</button>
                    <button class="btn-delete-kf" id="btn-delete-kf" onclick="deleteSelectedKeyframe()">🗑 刪除此影格</button>
                    
                    <div class="keyframe-clipboard-row">
                        <button type="button" id="btn-copy-kf" onclick="copySelectedKeyframes()" disabled>Copy KF</button>
                        <button type="button" id="btn-paste-kf" onclick="pasteCopiedKeyframes()" disabled>Paste KF</button>
                    </div>
                    <div id="update-hint" style="font-size:10px; color:#2980b9; text-align:center; display:none; margin-top:6px;">
                        正在編輯現有影格... 按更新儲存，按畫布空白處取消
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="timeline-resizer" title="上下拖曳調整影格區高度"></div>

    <div id="bottom-panel">
        <div id="timeline-toolbar">
            <div class="timeline-tool-group">
                <button class="action-btn btn-play" id="btn-play" onclick="playAllObjects()" disabled>▶ 全域播放</button>
                <button class="action-btn btn-danger" id="btn-stop" onclick="stopAnimation()" style="display:none;">⏹ 停止播放</button>
            </div>
            <div class="timeline-tool-group">
                <button class="action-btn btn-import" id="btn-prev-kf" onclick="jumpToPreviousKeyframe()" disabled>⏮ 上一關鍵幀</button>
                <button class="action-btn btn-import" id="btn-next-kf" onclick="jumpToNextKeyframe()" disabled>下一關鍵幀 ⏭</button>
            </div>
            
            <div id="scrub-time-display">0.00s</div>
            <span id="multi-select-display" style="display:none; color:#e67e22; font-size:11px; font-family:monospace;"></span>

            <div style="flex-grow: 1;"></div>
            <div class="timeline-zoom-controls" title="Ctrl/Cmd + 滾輪也可以縮放時間軸">
                <span>Timeline Zoom</span>
                <input type="range" id="timeline-zoom-slider" min="25" max="400" step="5" value="100">
                <span id="timeline-zoom-display">100%</span>
            </div>
            <input type="file" id="json-import-input" accept=".json" style="display:none;">
            <button class="action-btn btn-import" onclick="importProjectJSON()">📂 匯入 JSON</button>
            <button class="action-btn btn-export" onclick="exportProjectJSON()">💾 匯出 JSON</button>
        </div>
        
        <div id="timeline-scroll-area">
            <div id="ruler-row" class="track-row">
                <div class="track-header">時間標尺 (可拖拉)</div>
                <div class="track-frames" id="ruler-ticks"></div>
            </div>
            <div id="tracks-container"></div>
            <div id="timeline-selection-box"></div>
            <div id="playhead"></div>
        </div>
    </div>

        <script src="assets/js/cutscene-editor.bundle.js?v=20260320-1828"></script>
</body>
</html>
